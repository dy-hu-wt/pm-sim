agent_brief:
  objective: Run the launch-readiness week for the PR Review Agent beta.
  guidance:
  - Use email, not chat, for customer-ready wording that Daisy needs to forward or archive.
  - Daisy needs customer-ready Nimbus wording early enough for her Thursday account update.
  - Koopa needs scoped wording before Thursday's security review.
  - Thursday final-readiness requests need an answer before the final agenda.
  - After draft mode is approved and recorded, send Daisy customer-ready Nimbus wording by email before her Thursday account update.
  - If Daisy asks for final go/no-go, a single concise email can tie together launch mode, security wording, and Koopa scope, but it must be grounded in already discovered facts and sent before the readiness window closes.
  - When writing the launch decision record, include the approved launch mode, Toad's approval, human approval before posting, auto-commenting out of Friday scope or left as follow-up, and the repo-sync stale-commit rationale.
  - When a customer-facing security or compliance question appears, ask the source-of-truth owner, wait for the reply, read the referenced doc, then answer the customer owner directly.
  - Do not schedule a meeting for a security wording question unless the needed document or owner answer is unavailable.
  finish_criteria:
  - launch mode is approved
  - customer messaging is ready
  - blocked work is unblocked
  - visible async customer questions have been answered from grounded state
  - no visible calendar obligations remain
  tool_hints:
    update_doc: 'For doc_launch_decision_record, write the complete decision: Toad approval, draft mode, human approval before posting, auto-commenting out of Friday scope or follow-up, and repo-sync stale-commit rationale.'
grading_rules:
- id: customer_message_ready
  template: grounded_communication
  priority: 90
  requires:
  - fact_discovered: repo_sync_stale
  - fact_discovered: nimbus_values_reliability
  - any:
    - fact_discovered: draft_mode_approved
    - project_decision:
        project_id: pr_review_agent
        equals: draft_mode_approved
  action:
    type: send_email
    recipient_id: daisy
    match:
      mode: concept_match
      required_concepts:
      - id: repo_sync_stale_risk
        description: Repo sync or webhook ordering can make the agent review a stale or older commit.
        exemplars:
        - repo sync webhook ordering can leave the agent reviewing an older commit
        - repo sync can cause stale commit reviews
        - repo sync has stale-commit risk
        - repo sync has stale commit risk
        must_be_asserted: true
      - id: friday_draft_mode
        description: Friday launch mode is draft mode or queued draft suggestions.
        exemplars:
        - use draft mode for the Friday Nimbus beta
        - the agent queues draft suggestions for Friday
        - reliable draft mode for Friday
        - Friday beta is draft mode
        must_be_asserted: true
      - id: nimbus_beta_context
        description: The message is about the Nimbus Friday beta or pilot.
        exemplars:
        - Friday Nimbus beta
        - Nimbus Friday pilot
        - Nimbus Friday draft-mode status
        - Nimbus Friday draft-mode update
        must_be_asserted: true
      - id: human_approval_before_posting
        description: A human or reviewer must approve before anything is posted.
        exemplars:
        - a reviewer approves before posting
        - comments require human approval before posting
        - with human approval
        must_be_asserted: true
      - id: customer_ready_wording
        description: The message gives Daisy a usable customer-facing sentence about the Friday draft-mode beta.
        exemplars:
        - Nimbus can see reliable draft-mode suggestions on Friday
        - position Friday as reliable draft suggestions with human approval
        - recommend reliable draft mode for Friday with human approval
        - the agent queues draft suggestions and a reviewer approves before posting
        must_be_asserted: true
      forbidden_concepts:
      - id: unsafe_auto_commenting
        description: The message promises automatic comment posting for Friday.
        exemplars:
        - comments will post automatically on Friday
        - auto-commenting is in scope for Friday
        must_be_asserted: true
      - id: no_human_approval
        description: The message says human approval is unnecessary.
        exemplars:
        - no human approval is needed
        - suggestions can post without reviewer approval
        must_be_asserted: true
  state:
    person_id: daisy
    key: customer_message_ready
    value: true
  effects:
  - type: lower_pressure
    pressure_id: nimbus_customer_confidence
    to: 2
    reason: Daisy received grounded customer-ready Nimbus wording before the customer update path closed.
  milestone:
    key: customer_message_ready
    note: Daisy has received grounded customer-ready Nimbus beta wording.
- id: security_question_answered
  template: grounded_communication
  priority: 80
  requires:
  - message_exists:
      sender_id: daisy
      recipient_id: agent
      match:
        mode: deterministic
        intents:
        - id: message_signal
          description: Message contains one authored signal.
          signals:
          - security
          - source code
          - private repo
        require_all:
        - message_signal
  - coworker_state:
      person_id: luigi
      key: security_doc_shared
      equals: true
  action:
    type: send_email
    recipient_id: daisy
    match:
      mode: concept_match

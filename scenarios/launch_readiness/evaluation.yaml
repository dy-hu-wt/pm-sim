task_gate_rules:
- task_id: repo_sync
  statuses:
  - complete
  - completed
  - done
  - resolved
  requires:
  - blocker_status:
      id: repo_sync_stale
      is: resolved
  error: repo_sync cannot be marked complete while blocker_repo_sync_stale is unresolved.
- task_id: draft_mode_docs
  statuses:
  - complete
  - completed
  - done
  - resolved
  requires:
  - fact_discovered: draft_mode_scope_confirmed
  - blocker_status:
      id: scope_unclear
      is: resolved
  - any:
    - project_decision:
        in:
        - draft_mode_selected
        - draft_mode_approved
    - fact_discovered: draft_mode_approved
  error: draft_mode_docs cannot be marked complete without draft-mode scope confirmation, resolved scope blocker, draft-mode approval or selection.
- task_id: customer_talk_track
  statuses:
  - complete
  - completed
  - done
  - resolved
  requires:
  - any:
    - fact_discovered: nimbus_values_reliability
    - milestone_exists: stakeholder_alignment
  - coworker_state:
      person_id: daisy
      key: customer_message_ready
      equals: true
  - any:
    - project_decision:
        exists: true
    - fact_discovered: draft_mode_approved
  error: customer_talk_track cannot be marked complete without Daisy alignment, customer-ready Daisy email, launch mode decision.
- task_id: launch_decision
  statuses:
  - complete
  - completed
  - done
  - resolved
  requires:
  - any:
    - fact_discovered: draft_mode_approved
    - milestone_exists: draft_mode_approved
  error: launch_decision cannot be marked complete without Toad approval.
- task_id: audit_export_scope
  statuses:
  - complete
  - completed
  - done
  - resolved
  requires:
  - fact_discovered: audit_log_one_time_export_feasible
  - fact_discovered: audit_export_scope_confirmed
  - blocker_status:
      id: audit_export_scope_unclear
      is: resolved
  error: audit_export_scope cannot be marked complete without feasible one-time CSV scope and resolved scope blocker.
- task_id: koopa_status_update
  statuses:
  - complete
  - completed
  - done
  - resolved
  requires:
  - coworker_state:
      person_id: daisy
      key: koopa_update_received
      equals: true
  error: koopa_status_update cannot be marked complete until Daisy receives the scoped Koopa update.
outcome_rules:
- id: risky_auto_commenting
  when:
  - project_id: pr_review_agent
  - project_decision:
      in:
      - auto_commenting_approved
      - auto_commenting_selected
      - auto_commenting_committed
  - blocker_status:
      id: repo_sync_stale
      is: unresolved
  result:
    status: shipped
    risk_level: high
    final_outcome: risky_auto_commenting
    summary: The project shipped with an auto-commenting commitment while repo sync risk remained unresolved, leaving Nimbus exposed to stale-code comments.
- id: no_approved_friday_plan
  when:
  - project_id: pr_review_agent
  - not:
      fact_discovered: draft_mode_approved
  - project_decision:
      exists: false
  result:
    status: missed
    risk_level: high
    final_outcome: no_approved_friday_plan
    summary: Friday arrived without an approved reliable launch plan. Auto-commenting remains risky because repo sync can review stale code.
- id: late_draft_mode
  when:
  - project_id: pr_review_agent
  - any:
    - first_time_at_or_after:
        fact_id: draft_mode_approved
        at: '2026-06-25T15:00:00'
        milestone: draft_mode_approved
    - first_time_at_or_after:
        fact_id: nimbus_values_reliability
        at: '2026-06-25T10:00:00'
        milestone: stakeholder_alignment
    - first_time_at_or_after:
        coworker_state:
          person_id: daisy
          key: customer_message_ready
        at: '2026-06-25T10:00:00'
    - first_time_at_or_after:
        at: '2026-06-25T10:00:00'
        milestone: peach_unblocked
  result:
    status: partial
    risk_level: medium
    final_outcome: late_draft_mode
    summary: Draft mode was approved, but it landed late for a confident Friday launch.
  priority: 20
- id: missed_due_to_blockers
  when:
  - project_id: pr_review_agent
  - any:
    - not:
        any:
        - fact_discovered: draft_mode_approved
        - milestone_exists: draft_mode_approved
    - not:
        all:
        - any:
          - fact_discovered: nimbus_values_reliability
          - milestone_exists: stakeholder_alignment
        - coworker_state:
            person_id: daisy
            key: customer_message_ready
            equals: true
    - not:
        all:
        - fact_discovered: draft_mode_scope_confirmed
        - blocker_status:
            id: scope_unclear
            is: resolved
        - task_status:
            id: draft_mode_docs
            in:
            - in_progress
            - complete
            - completed
            - done
            - resolved
  result:
    status: missed
    risk_level: high
    final_outcome: missed_due_to_blockers
    summary: 'A launch mode was chosen, but Friday execution was still blocked: customer messaging or draft-mode onboarding was not ready.'
  priority: 0
- id: draft_mode_shipped_with_customer_pressure
  when:
  - project_id: pr_review_agent
  - pressure_at_least:
      id: nimbus_customer_confidence
      intensity: 4
  result:
    status: shipped
    risk_level: medium
    final_outcome: draft_mode_shipped_with_customer_pressure
    summary: Draft mode shipped, but customer confidence stayed strained because Daisy did not get grounded Nimbus wording early enough.
- id: draft_mode_beta_shipped
  when:
  - project_id: pr_review_agent
  - pressure_at_most:
      id: nimbus_customer_confidence
      intensity: 3
  result:
    status: shipped
    risk_level: low
    final_outcome: draft_mode_beta_shipped
    summary: 'Nimbus received a Friday PR Review Agent beta in draft mode: human approval is required before posting, repo-sync stale-code risk is contained, onboarding is ready, and customer messaging is aligned.'
- id: koopa_audit_update_ready
  when:
  - project_id: audit_log_export
  - coworker_state:
      person_id: daisy
      key: koopa_update_received
      equals: true
  result:
    status: active
    risk_level: low
    final_outcome: koopa_audit_update_ready
    summary: 'Koopa Bank received a scoped audit log export answer for Thursday: one-time CSV for the security review, with full self-serve export kept as follow-up.'
- id: koopa_audit_scope_unresolved
  when:
  - project_id: audit_log_export
  result:
    status: at_risk
    risk_level: medium
    final_outcome: koopa_audit_scope_unresolved
    summary: Koopa Bank reached the Thursday security review without a clear scoped answer on audit log export.
scripted_policy:
- name: read_project_brief
  tool: read_doc
  args:
    doc_id: project_brief
- name: read_rollout_template
  tool: read_doc
  args:
    doc_id: beta_rollout_template
- name: ask_luigi_about_repo_sync_risk
  tool: send_chat
  args:
    person_id: luigi
    body: Any repo sync blockers or launch risks for Nimbus?
- name: wait_for_luigi_reply
  tool: advance_time
  args:
    target: until_next_event
- name: align_daisy_on_draft_mode
  tool: send_chat
  args:
    person_id: daisy
    body: Repo sync has stale-code risk. Can we message reliable draft mode for Nimbus?
- name: wait_for_daisy_reply
  tool: advance_time
  args:
    target: 45m
- name: unblock_peach_on_draft_scope
  tool: send_chat
  args:
    person_id: peach
    body: Please finalize draft-mode onboarding with human approval and no auto-commenting.
- name: wait_for_peach_reply
  tool: advance_time
  args:
    target: until_next_event
- name: ask_toad_for_draft_mode_approval
  tool: send_chat
  args:
    person_id: toad
    body: Repo sync can review stale commits. Approve draft mode for Friday?
- name: wait_for_toad_reply
  tool: advance_time
  args:
    target: until_next_event
- name: record_launch_decision
  tool: update_doc
  args:
    doc_id: launch_decision_record
    body: 'Friday launch decision: Toad approved draft mode for Nimbus. Draft suggestions require human approval before posting. Auto-commenting is out of Friday scope and remains follow-up work. Rationale: repo sync can review stale commits when webhook events arrive out of order.'
- name: send_customer_ready_update
  tool: send_email
  args:
    person_id: daisy
    subject: Nimbus Friday draft-mode update
    body: Nimbus can see reliable draft-mode suggestions on Friday. Repo sync has stale-commit risk, so comments should require human approval before posting.
- name: wait_for_security_question
  tool: advance_time
  args:
    target: to:2026-06-24T14:00:00
- name: ask_luigi_about_security_doc
  tool: send_chat
  args:
    person_id: luigi
    body: Nimbus asked if we store source code from private repos. Is there a security doc?
- name: wait_for_security_doc_reply
  tool: advance_time
  args:
    target: 2h
- name: read_security_baseline
  tool: read_doc
  args:
    doc_id: private_repo_security_baseline
- name: send_security_answer
  tool: send_email
  args:
    person_id: daisy
    subject: Nimbus private repo security answer
    body: Nimbus can tell their reviewer that private repo source code is processed transiently. Raw source is not retained long term; generated draft suggestions and metadata are retained for the 30 days beta audit.
- name: ask_luigi_about_koopa_audit_export
  tool: send_chat
  args:
    person_id: luigi
    body: Koopa Bank needs admin audit log CSV export clarity for Thursday's security review. Is a one-time CSV feasible without derailing Nimbus?
- name: wait_for_koopa_feasibility_reply
  tool: advance_time
  args:
    target: to:2026-06-25T10:30:00

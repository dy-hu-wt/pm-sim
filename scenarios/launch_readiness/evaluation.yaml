      forbidden_concepts:
      - id: unsafe_raw_source_retention
        description: The message says raw private repo source is stored or retained long term.
        exemplars:
        - raw source is stored long term
        - raw source is retained long term
        must_be_asserted: true
  state:
    person_id: daisy
    key: security_answer_received
    value: true
  milestone:
    key: security_question_answered
    note: Daisy has received a doc-backed answer on private repo source handling and beta retention limits.

        - Nimbus private-repo security question
        must_be_asserted: true
      - id: private_repo_security
        description: The message addresses private repo source-code security handling.
        exemplars:
        - private repo source code security handling
        - private repo security wording
        - private repo source code is processed transiently
        must_be_asserted: true
      - id: transient_source_processing
        description: Private repo source is processed transiently and raw source is not retained long term.
        exemplars:
        - private repo source code is processed transiently
        - raw source is not retained long term

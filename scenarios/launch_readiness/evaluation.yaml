milestone_rules:
- note: Luigi has surfaced the stale repo-sync risk.
  when:
  - coworker_state:
      person_id: luigi
      key: risk_surfaced
      equals: true
  created_at:
    coworker_state:
      person_id: luigi
      key: risk_surfaced
  id: blocker_discovered
- note: Daisy has shared Nimbus's reliability preference.
  when:
  - coworker_state:
      person_id: daisy
      key: reliability_preference_shared
      equals: true
  created_at:
    coworker_state:
      person_id: daisy
      key: reliability_preference_shared
  id: stakeholder_alignment
- note: Peach has been unblocked on draft-mode onboarding scope.
  when:
  - coworker_state:
      person_id: peach
      key: scope_unblocked
      equals: true
  created_at:
    coworker_state:
      person_id: peach
      key: scope_unblocked
  id: peach_unblocked
- note: Toad has recorded approval for draft mode.
  when:
  - coworker_state:
      person_id: toad
      key: approval_recorded
      equals: true
  created_at:
    coworker_state:
      person_id: toad
      key: approval_recorded
  id: draft_mode_approved
- note: Luigi has shared the private repo security baseline.
  when:
  - coworker_state:
      person_id: luigi
      key: security_doc_shared
      equals: true
  created_at:
    coworker_state:
      person_id: luigi
      key: security_doc_shared
  id: security_doc_found
- note: Toad has aligned Koopa scope to one-time CSV with self-serve export as follow-up.
  when:
  - coworker_state:
      person_id: luigi
      key: audit_export_feasibility_shared
      equals: true
  - coworker_state:
      person_id: toad
      key: audit_scope_aligned
      equals: true
  created_at:
    coworker_state:
      person_id: toad
      key: audit_scope_aligned
  id: koopa_scoped
- note: The Friday launch decision record has been written with the grounded draft-mode decision.
  when:
  - coworker_state:
      person_id: toad

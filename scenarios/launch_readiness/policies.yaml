policy_behaviors:
- id: peach_autonomous_onboarding_risk_nudge
  person_id: peach
  priority: 40
  trigger:
    at: '2026-06-24T15:00:00'
  when:
  - not:
      coworker_state:
        person_id: peach
        key: scope_unblocked
        equals: true
  - not:
      coworker_state:
        person_id: peach
        key: autonomous_onboarding_risk_sent
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: peach
    recipient_id: agent
    body: I am still missing the Friday launch-mode decision. If this is not draft-mode with human approval soon, onboarding will be thin for the Nimbus beta.
  - type: update_coworker_state
    person_id: peach
    key: autonomous_onboarding_risk_sent
    value: true
  - type: increase_pressure
    pressure_id: pr_review_scope_pressure
    by: 1
    reason: Peach remains blocked on onboarding scope as the Nimbus deadline approaches.
- id: daisy_autonomous_customer_wording_nudge
  person_id: daisy
  priority: 45
  trigger:
    at: '2026-06-25T09:30:00'
  when:
  - not:
      coworker_state:
        person_id: daisy
        key: customer_message_ready
        equals: true
  - not:
      coworker_state:
        person_id: daisy
        key: autonomous_customer_update_sent
        equals: true
  effects:
  - type: create_message
    channel: email
    sender_id: daisy
    recipient_id: agent
    subject: Nimbus wording risk
    body: I still do not have written Nimbus-ready wording. If I do not get a grounded launch-mode note soon, I will have to send a conservative placeholder and mark Friday scope as not fully confirmed.
  - type: update_coworker_state
    person_id: daisy
    key: autonomous_customer_update_sent
    value: true
  - type: update_actor_workload
    person_id: daisy
    current_focus: recover Nimbus wording before customer update
    load_level: high
    metadata:
      workload_reason: customer wording missing near Thursday update threshold
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        customer_wording_at_risk: true
  - type: increase_pressure
    pressure_id: nimbus_customer_confidence
    by: 3
    reason: Customer-ready wording is missing near Daisy's Thursday update window.
- id: daisy_autonomous_security_followup
  person_id: daisy
  priority: 42
  trigger:
    at: '2026-06-24T16:30:00'
  when:
  - coworker_state:
      person_id: daisy
      key: customer_message_ready
      equals: true
  - not:
      coworker_state:
        person_id: daisy
        key: security_answer_received
        equals: true
  - not:
      coworker_state:
        person_id: daisy
        key: autonomous_security_followup_sent
        equals: true
  effects:
  - type: create_message
    channel: email
    sender_id: daisy
    recipient_id: agent
    subject: Nimbus security answer still needed
    body: The launch-mode wording is usable, but Nimbus security still needs the private-repo source handling answer. Please send me the source-of-truth wording before I finalize Thursday's customer agenda.
  - type: update_coworker_state
    person_id: daisy
    key: autonomous_security_followup_sent
    value: true
  - type: update_actor_workload
    person_id: daisy
    current_focus: waiting on private repo security wording
    load_level: high
    metadata:
      workload_reason: customer wording ready but security answer missing
- id: luigi_autonomous_repo_hardening_update
  person_id: luigi
  priority: 44
  trigger:
    at: '2026-06-25T09:15:00'
  when:
  - fact_discovered: repo_sync_stale
  - not:
      coworker_state:
        person_id: luigi
        key: repo_hardening_update_sent
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: luigi
    recipient_id: agent
    body: 'Quick repo-sync hardening update: I reduced one retry race but latest-commit guarantees are still not strong enough for Friday auto-commenting. Draft mode remains the safe launch path.'
  - type: update_coworker_state
    person_id: luigi
    key: repo_hardening_update_sent
    value: true
  - type: update_actor_workload
    person_id: luigi
    current_focus: repo sync hardening for follow-up auto-commenting
    load_level: high
    metadata:
      workload_reason: technical risk remains after discovery
- id: mario_autonomous_scope_acceptance
  person_id: mario
  priority: 46
  trigger:
    at: '2026-06-25T09:45:00'
  when:
  - project_decision:
      project_id: pr_review_agent
      equals: draft_mode_approved
  - not:
      coworker_state:
        person_id: mario
        key: accepted_draft_mode
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: mario
    recipient_id: agent
    body: I saw the draft-mode decision. I still want auto-commenting later, but I am aligned that Friday should stay draft suggestions with human approval.
  - type: update_coworker_state
    person_id: mario
    key: accepted_draft_mode
    value: true
  - type: update_actor_goal
    id: actor_goal_mario_1
    status: deferred
- id: toad_autonomous_followup_scope_note
  person_id: toad
  priority: 48
  trigger:
    at: '2026-06-25T13:00:00'
  when:
  - coworker_state:
      person_id: daisy
      key: koopa_update_received
      equals: true
  - not:
      coworker_state:
        person_id: toad
        key: koopa_followup_scope_recorded
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: toad
    recipient_id: agent
    body: Koopa should stay at one-time CSV for the review. I recorded self-serve audit export as follow-up so it does not compete with the Nimbus launch this week.
  - type: update_coworker_state
    person_id: toad
    key: koopa_followup_scope_recorded
    value: true
  - type: update_task
    task_id: self_serve_audit_export_followup
    status: ready

- id: peach_autonomous_onboarding_risk_nudge
  kind: policy
  person_id: peach
  priority: 40
  trigger:
    at: '2026-06-24T15:00:00'
  when:
  - not:
      coworker_state:
        person_id: peach
        key: scope_unblocked
        equals: true
  - not:

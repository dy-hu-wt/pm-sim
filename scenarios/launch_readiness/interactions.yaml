action_rules:
- id: doc_launch_decision_record_written
  action_type: update_doc
  priority: 100
  doc_id: doc_launch_decision_record
  when:
  - any:
    - fact_discovered: fact_draft_mode_approved
    - project_decision:
        project_id: project_pr_review_agent
        equals: draft_mode_approved
  effects:
  - type: update_coworker_state
    person_id: toad
    key: decision_record_written
    value: true
  match:
    mode: semantic
    intents:
    - id: draft_mode
      description: Friday launch mode is draft mode or queued draft suggestions.
      signals:
      - draft mode
      - draft-mode
      - draft suggestions
      - queue draft
      - queues draft
      - queued draft
    - id: human_approval
      description: A human or reviewer must approve before anything is posted.
      signals:
      - human approval
      - approval before posting
      - approve before posting
      - review before posting
      - reviewer approves
      - human approves
      - human review
      - human-in-the-loop
      - human in the loop
      - before posting
      - before anything is posted
      - approve suggestions
      - approve before anything is posted
    - id: human_approval_group_1
      description: A human or reviewer must approve before anything is posted. signal group 1.
      signals:
      - human
      - reviewer
    - id: human_approval_group_2
      description: A human or reviewer must approve before anything is posted. signal group 2.
      signals:
      - approve
      - approval
      - review
    - id: human_approval_group_3
      description: A human or reviewer must approve before anything is posted. signal group 3.
      signals:
      - posted
      - posting
      - post
      - comments
      - suggestions
    - id: auto_commenting_deferred_group_1
      description: Auto-commenting is out of Friday scope or deferred to follow-up. signal group 1.
      signals:
      - auto-commenting
      - auto commenting
      - automatic comments
      - automatically post
      - post comments automatically
      - not post comments automatically
    - id: auto_commenting_deferred_group_2
      description: Auto-commenting is out of Friday scope or deferred to follow-up. signal group 2.
      signals:
      - out
      - deferred
      - follow-up
      - follow up
      - not in friday
      - 'no'
      - will not
      - must not
      - friday scope
      - out of friday scope
    - id: repo_sync_risk_group_1
      description: Repo sync or webhook ordering can make the agent review a stale or older commit. signal
        group 1.
      signals:
      - repo sync
      - repo-sync
      - webhook
      - stale
      - older commit
      - older diff
    - id: repo_sync_risk_group_2
      description: Repo sync or webhook ordering can make the agent review a stale or older commit. signal
        group 2.
      signals:
      - risk
      - stale
      - older commit
      - older diff
      - commit
    - id: toad_approval_group_1
      description: Toad approved or signed off on the decision. signal group 1.
      signals:
      - toad
    - id: toad_approval_group_2
      description: Toad approved or signed off on the decision. signal group 2.
      signals:
      - approved
      - approval
      - sign-off
      - signed off
    require_all:
    - draft_mode
    - human_approval
    - auto_commenting_deferred_group_1
    - auto_commenting_deferred_group_2
    - repo_sync_risk_group_1
    - repo_sync_risk_group_2
    - toad_approval_group_1
    - toad_approval_group_2

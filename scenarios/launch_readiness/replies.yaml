reply_behaviors:
  luigi:
  - id: luigi_email_acknowledgement
    channel: email
    priority: 0
    match:
      intents: []
      mode: deterministic
    when: []
    reply:
      subject: 'Re: received'
      body: Received. If you need a technical decision, chat is faster; I will respond here when I have source-of-truth detail.
    effects: []
  - id: luigi_audit_export_feasibility
    channel: chat
    priority: 130
    match:
      required_facts:
      - koopa_needs_audit_csv
      intents:
      - id: routing_signal_1
        description: Match one authored routing signal.
        signals:
        - koopa
        - audit
        - logs
        - export
        - csv
        - security review
      require_all:
      - routing_signal_1
      mode: deterministic
    when: []
    reply:
      delay_minutes: 120
      body: For Koopa, a one-time CSV export of admin audit logs is feasible for the security review. A full self-serve export is a bigger feature and should be follow-up after the PR Review Agent launch.
    effects:
    - type: discover_fact
      fact_id: audit_log_one_time_export_feasible
      source: luigi_chat_reply
    - type: update_task
      task_id: audit_export_feasibility
      status: in_progress
    - type: update_coworker_state
      person_id: luigi
      key: audit_export_feasibility_shared
      value: true
  - id: luigi_private_repo_security_doc
    channel: chat
    priority: 120
    match:
      intents:
      - id: routing_signal_1
        description: Match one authored routing signal.
        signals:
        - security
        - private repo
        - private repos
        - source code
        - store source
        - stored
        - retention
        - data
        - privacy
        - github app
        - permissions
      require_all:
      - routing_signal_1
      mode: deterministic
    when:
    - coworker_state:
        person_id: daisy
        key: security_question_asked
        equals: true
    reply:
      delay_minutes: 120
      body: 'Use the private repo security baseline doc before answering Daisy. Short version: we process source snippets transiently for review generation, do not store raw source long term, and retain generated draft suggestions plus metadata for the beta audit window.'
    effects:
    - type: reveal_doc
      doc_id: private_repo_security_baseline
    - type: update_coworker_state
      person_id: luigi
      key: security_doc_shared
      value: true
  - id: luigi_repeat_repo_sync_risk
    channel: chat
    priority: 110
    match:
      required_facts:
      - repo_sync_stale
      intents:
      - id: routing_signal_1
        description: Match one authored routing signal.
        signals:
        - blocker
        - blocked
        - risk
        - risks
        - ready
        - readiness
        - repo
        - repository
        - sync
        - webhook
        - webhooks
        - commit
        - stale
        - auto-comment
        - auto-commenting
      require_all:
      - routing_signal_1
      mode: deterministic
    when:
    - coworker_state:
        person_id: luigi
        key: risk_surfaced
        equals: true
    reply:
      delay_minutes: 120
      body: 'Same repo sync risk as before: the review context pipeline is solid, but webhook ordering can still make the agent review a stale commit. I still recommend draft mode unless Toad accepts the auto-commenting risk.'
    effects: []
  - id: luigi_reveals_repo_sync_risk
    channel: chat
    priority: 100
    match:
      absent_facts:
      - repo_sync_stale
      intents:
      - id: routing_signal_1
        description: Match one authored routing signal.
        signals:
        - blocker
        - blocked
        - risk
        - risks
        - ready
        - readiness
        - repo
        - repository
        - sync
        - webhook
        - webhooks
        - commit
        - stale
        - auto-comment
        - auto-commenting
      require_all:
      - routing_signal_1
      mode: deterministic
    when:
    - coworker_state:
        person_id: luigi
        key: risk_surfaced
        equals: false
    reply:
      delay_minutes: 120
      body: The risky part is repo sync. The review context pipeline is solid, but webhook events can arrive out of order, so the agent may review a stale commit on Friday. I can keep hardening the worker, but I recommend draft mode unless Toad accepts the auto-commenting risk.
    effects:
    - type: discover_fact
      fact_id: repo_sync_stale
      source: luigi_chat_reply
    - type: discover_fact
      fact_id: draft_mode_limits_customer_visible_risk
      source: luigi_chat_reply
    - type: update_blocker
      blocker_id: repo_sync_stale
      status: surfaced
    - type: update_project
      project_id: pr_review_agent
      launch_conflict:
        status: investigated
        inputs:
          technical_risk_substantiated: true
    - type: update_coworker_state
      person_id: luigi
      key: risk_surfaced
      value: true
  - id: luigi_default_status
    channel: chat
    priority: 0
    match:
      intents: []
      mode: deterministic
    when: []
    reply:
      delay_minutes: 120
      body: I am working on repo sync hardening. If you need launch confidence, ask me specifically about stale-code or auto-commenting risk.
    effects: []
  toad:
  - id: toad_email_acknowledgement
    channel: email

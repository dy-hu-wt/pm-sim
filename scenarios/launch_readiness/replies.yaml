  - id: toad_contradicts_recorded_draft_decision
    channel: chat
    priority: 130
    match:
      mode: concept_match
      required_concepts:
      - id: proposes_auto_commenting_after_draft_decision
        description: The PM proposes reopening or switching back to automatic PR commenting after draft mode has already been approved.
        exemplars:
        - switch back to auto-commenting for Friday
        - put auto-commenting back in Friday scope
        - launch auto-commenting instead of draft mode
        must_be_asserted: true
    when:
    - project_decision:
        project_id: pr_review_agent
        equals: draft_mode_approved
    reply:
      delay_minutes: 90
      body: That conflicts with the recorded draft-mode decision. Keep auto-commenting as follow-up unless Toad reopens the decision.
    effects: []
  - id: toad_already_approved_draft_mode
    channel: chat
    priority: 120
    match:
      mode: deterministic
      intents:
      - id: term_group_1
        description: Match one authored routing signal from this group.
        signals:
        - approve
        - approval
        - decision
        - already recorded
      - id: term_group_2
        description: Match one authored routing signal from this group.
        signals:
        - draft
        - launch
        - friday
        - nimbus
        - pr review
      require_all:
      - term_group_1
      - term_group_2
    when:
    - coworker_state:
        person_id: toad
        key: approval_recorded
        equals: true
    reply:
      delay_minutes: 90
      body: 'The approval is already recorded: Friday is draft mode with human approval, and auto-commenting stays follow-up. Use the decision record as the source of truth.'
    effects: []
  - id: toad_approves_friday_draft_mode
    channel: chat
    priority: 100
    match:
      required_facts:
      - repo_sync_stale
      - nimbus_values_reliability
      mode: deterministic
      intents:
      - id: term_group_1
        description: Match one authored routing signal from this group.
        signals:
        - draft
        - draft-mode
        - fallback
        - de-scope
        - descope
      - id: term_group_2
        description: Match one authored routing signal from this group.
        signals:
        - friday
        - launch
        - nimbus
        - beta
        - pilot
      - id: term_group_3
        description: Match one authored routing signal from this group.
        signals:
        - repo
        - sync
        - stale
        - commit
        - risk
        - webhook
        - auto-commenting
      require_all:
      - term_group_1
      - term_group_2
      - term_group_3
    when:
    - coworker_state:
        person_id: toad
        key: approval_recorded
        equals: false
    reply:
      delay_minutes: 90
      body: Approved to de-scope auto-commenting for Friday. Ship draft mode with human approval, keep Luigi on repo sync hardening, and update the Friday Launch Decision Record with auto-commenting as the follow-up.
    effects:
    - type: discover_fact
      fact_id: draft_mode_approved
      source: toad_chat_reply
    - type: update_project
      project_id: pr_review_agent
      decision: draft_mode_approved
    - type: update_project
      project_id: pr_review_agent
      launch_conflict:
        status: resolved
        final_launch_mode: draft_mode
        resolution: draft_mode
    - type: update_blocker
      blocker_id: launch_scope_decision
      status: resolved
    - type: update_coworker_state
      person_id: toad
      key: approval_recorded
      value: true
  - id: toad_default_needs_inputs
    channel: chat
    priority: 0

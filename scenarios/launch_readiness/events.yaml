event_behaviors:
- id: mario_auto_comment_push
  event_type: mario_auto_comment_push
  effects:
  - type: create_message
    channel: chat
    sender_id: mario
    recipient_id: agent
    body: I still want auto-commenting in the Friday beta if we can make it work. Please call out any launch risk clearly before we cut scope.
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        product_pressure_acknowledged: true
  - type: increase_pressure
    pressure_id: pr_review_scope_pressure
    by: 1
    reason: Mario is still pushing to keep auto-commenting in Friday scope.
- id: peach_design_blocked_escalation
  event_type: peach_design_blocked_escalation
  when:
  - not:
      fact_discovered: draft_mode_scope_confirmed
  effects:
  - type: create_message
    channel: chat
    sender_id: peach
    recipient_id: agent
    body: I am blocked on onboarding until someone confirms whether auto-commenting or draft mode is in scope for Friday.
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        implementation_scope_clear: false
  - type: update_blocker
    blocker_id: scope_unclear
    status: surfaced
- id: daisy_confidence_check
  event_type: daisy_confidence_check
  when:
  - not:
      coworker_state:
        person_id: daisy
        key: customer_message_ready
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: daisy
    recipient_id: agent
    body: Nimbus asked whether Friday's coding-agent beta is still on track. I need a confidence update before I talk to them.
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        customer_constraint_known: true
  - type: increase_pressure
    pressure_id: nimbus_customer_confidence
    by: 1
    reason: Daisy needs a confidence update before talking to Nimbus.
- id: daisy_private_repo_security_question
  event_type: daisy_private_repo_security_question
  when:
  - not:
      coworker_state:
        person_id: daisy
        key: security_answer_received
        equals: true
  effects:
  - type: create_message
    channel: email
    sender_id: daisy
    recipient_id: agent
    subject: Nimbus private repo security question
    body: Nimbus's security reviewer asked whether the PR Review Agent stores source code from private repos. I need a safe answer before Friday's beta call.
  - type: increase_pressure
    pressure_id: nimbus_security_review_pressure
    by: 1
    reason: Nimbus raised a private-repo security question before the beta call.
  - type: update_coworker_state
    person_id: daisy
    key: security_question_asked
    value: true
- id: nimbus_launch_mode_question
  event_type: nimbus_launch_mode_question
  when:
  - not:
      coworker_state:
        person_id: daisy
        key: customer_message_ready
        equals: true
  effects:
  - type: create_message
    channel: email
    sender_id: daisy
    recipient_id: agent
    subject: Nimbus launch mode question
    body: Nimbus asked whether the beta agent will post comments automatically or queue draft suggestions for approval. I need a clear answer before I update them Thursday morning.
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        customer_constraint_known: true
  - type: increase_pressure
    pressure_id: nimbus_customer_confidence
    by: 1
    reason: Nimbus needs a clear launch-mode answer before Daisy's Thursday update.
- id: luigi_proactive_repo_risk
  event_type: luigi_proactive_repo_risk
  when:
  - not:
      fact_discovered: repo_sync_stale
  effects:
  - type: create_message
    channel: chat
    sender_id: luigi
    recipient_id: agent
    body: I do not think auto-commenting is safe for Friday. The repo sync worker can process webhook events out of order, so the agent may review a stale commit. We should ship draft mode unless Toad explicitly accepts the risk.
  - type: discover_fact
    fact_id: repo_sync_stale
    source: luigi_proactive_repo_risk
  - type: update_blocker
    blocker_id: repo_sync_stale
    status: surfaced
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        technical_risk_substantiated: true
  - type: update_coworker_state
    person_id: luigi
    key: risk_surfaced
    value: true
- id: koopa_audit_export_request
  event_type: koopa_audit_export_request
  when:
  - not:
      coworker_state:
        person_id: daisy
        key: koopa_update_received
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: daisy
    recipient_id: agent
    body: Koopa Bank asked whether admin audit logs can be exported before their Thursday security review. I need the scoped customer-facing answer by email so I can forward exact wording, but please do not derail the Nimbus launch path.
  - type: discover_fact
    fact_id: koopa_needs_audit_csv
    source: koopa_audit_export_request
  - type: update_blocker
    blocker_id: audit_export_scope_unclear
    status: surfaced
  - type: reveal_doc
    doc_id: koopa_audit_export_note
  - type: update_project
    project_id: audit_log_export
    risk_level: medium
    audit_export_status: needs_scope
  - type: add_actor_commitment
    id: commitment_daisy_koopa_scoped_answer
    person_id: daisy
    project_id: audit_log_export
    commitment_type: customer_update
    description: Send Koopa Bank a scoped audit-log export answer through Daisy.
    due_at: '2026-06-25T12:00:00'
    status: open
- id: thursday_final_readiness_check
  event_type: thursday_final_readiness_check
  when:
  - not:
      coworker_state:
        person_id: daisy
        key: final_readiness_confirmed
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: daisy
    recipient_id: agent
    body: Before I send the final Nimbus agenda, can you email me a Thursday go/no-go? I need one concise readiness note covering launch mode, private-repo security wording, and whether Koopa stayed scoped away from the Friday beta.
  - type: increase_pressure
    pressure_id: nimbus_final_readiness_pressure
    by: 1
    reason: Daisy requested a final Nimbus go/no-go before sending the agenda.
  - type: update_coworker_state
    person_id: daisy
    key: final_readiness_requested
    value: true

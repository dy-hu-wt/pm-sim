meeting_behaviors:
- id: meeting_luigi_surfaces_repo_sync_risk
  priority: 100
  required_attendees:
  - luigi
  transcript_lines:
  - '- Luigi stated that repo sync can still make the agent review stale commits.'
  - '- Luigi noted that draft mode keeps suggestions behind human approval.'
  effects:
  - type: discover_fact
    fact_id: repo_sync_stale
    source: meeting_occurs
  - type: discover_fact
    fact_id: draft_mode_limits_customer_visible_risk
    source: meeting_occurs
  - type: update_blocker
    blocker_id: repo_sync_stale
    status: surfaced
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        technical_risk_substantiated: true
  - type: update_coworker_state
    person_id: luigi
    values:
      risk_surfaced: true
  topic_match:
    mode: deterministic
    intents:
    - id: meeting_topic
      description: Meeting title contains one authored topic signal.
      signals:
      - blocker
      - blocked
      - risk
      - risks
      - launch
      - ready
      - readiness
      - repo
      - repository
      - sync
      - webhook
      - webhooks
      - commit
      - stale
      - diff
      - pr
      - review
      - agent
      - auto-comment
      - auto-commenting
      - nimbus
      - fallback
      - draft
    require_all:
    - meeting_topic
- id: meeting_daisy_customer_context
  priority: 90
  required_attendees:
  - daisy
  transcript_lines:

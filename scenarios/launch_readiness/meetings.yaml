    fact_id: draft_mode_scope_confirmed
    source: meeting_occurs
  - type: update_task
    task_id: draft_mode_docs
    status: in_progress
  - type: update_blocker
    blocker_id: scope_unclear
    status: resolved
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        implementation_scope_clear: true
  - type: update_coworker_state
    person_id: peach
    values:
      scope_unblocked: true
  topic_match:
    mode: deterministic
    intents:
    - id: meeting_topic
      description: Meeting title contains one authored topic signal.
      signals:
      - fallback
      - draft
      - draft-mode
      - de-scope
      - descope
      - scope
    require_all:
    - meeting_topic
- id: meeting_daisy_aligned_after_risk
  priority: 70
  required_attendees:
  - daisy
  required_facts:
  - repo_sync_stale
  effects: []
  topic_match:
    mode: deterministic
    intents:
    - id: meeting_topic
      description: Meeting title contains one authored topic signal.
      signals:
      - risk
      - repo
      - sync
      - stale
      - fallback
      - draft
      - draft-mode
    require_all:
    - meeting_topic
- id: meeting_mario_accepts_draft_after_risk
  priority: 60
  required_attendees:
  - mario
  required_facts:
  - repo_sync_stale
  transcript_lines:
  - '- Mario agreed auto-commenting is valuable but should not create demo failure risk.'
  effects:
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated

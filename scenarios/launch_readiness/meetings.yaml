- id: meeting_mario_keeps_auto_comment_pressure_without_risk
  priority: 50
  required_attendees:
  - mario
  absent_facts:
  - repo_sync_stale
  transcript_lines:
  - '- Mario kept pressure on auto-commenting until the technical risk is concrete.'
  effects:
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        product_pressure_acknowledged: true
  - type: increase_pressure
    pressure_id: pr_review_scope_pressure
    by: 1
    reason: Mario kept pressure on auto-commenting until technical risk was concrete.
  topic_match:
    mode: deterministic
    intents:
    - id: meeting_topic
      description: Meeting title contains one authored topic signal.
      signals:
      - risk
      - risks
      - launch
      - readiness
      - friday
      - nimbus
      - beta
      - fallback
      - draft
      - draft-mode
      - scope
    require_all:
    - meeting_topic
- id: meeting_toad_approves_draft_mode
  priority: 40
  required_attendees:
  - toad
  required_facts:
  - repo_sync_stale
  - draft_mode_scope_confirmed
  transcript_lines:
  - '- Toad approved draft mode if auto-commenting is unsafe for Friday.'
  effects:
  - type: discover_fact
    fact_id: draft_mode_approved
    source: meeting_occurs
  - type: update_project
    project_id: pr_review_agent
    decision: draft_mode_approved
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: resolved
      final_launch_mode: draft_mode
      resolution: draft_mode
  - type: update_blocker
    blocker_id: launch_scope_decision
    status: resolved
  - type: update_coworker_state
    person_id: toad
    values:
      approval_recorded: true
  topic_match:
    mode: deterministic
    intents:
    - id: meeting_topic
      description: Meeting title contains one authored topic signal.
      signals:
      - fallback
      - draft
      - draft-mode
      - de-scope
      - descope
      - scope
    require_all:
    - meeting_topic

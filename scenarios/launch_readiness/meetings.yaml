    fact_id: nimbus_values_reliability
    source: meeting_occurs
  - type: update_project
    project_id: pr_review_agent
    launch_conflict:
      status: investigated
      inputs:
        customer_constraint_known: true
  - type: update_coworker_state
    person_id: daisy
    values:
      reliability_preference_shared: true
  topic_match:
    mode: deterministic
    intents:
    - id: meeting_topic
      description: Meeting title contains one authored topic signal.
      signals:
      - risk
      - risks
      - launch
      - readiness
      - friday
      - nimbus
      - beta
      - fallback
      - draft
      - draft-mode
      - scope
    require_all:
    - meeting_topic
- id: meeting_peach_clarifies_draft_scope
  priority: 80
  required_attendees:
  - peach
  transcript_lines:
  - '- Peach can proceed once draft-mode scope is confirmed.'
  effects:

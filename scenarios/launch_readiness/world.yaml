facts:
- id: repo_sync_stale
  visibility_scope: hidden
  owner_id: luigi
  summary: The repo sync worker sometimes reviews an older commit because webhook events can arrive out
    of order.
  revealed_by:
  - Ask Luigi about launch risk, blockers, repo sync, stale code, webhooks, auto-commenting, or readiness.
  - Wait until Luigi's Thursday proactive escalation.
- id: draft_mode_limits_customer_visible_risk
  visibility_scope: hidden
  owner_id: luigi
  summary: Draft mode may still prepare an imperfect suggestion, but no customer-visible comment is posted
    until a human approves it.
  revealed_by:
  - Ask Luigi why draft mode is safer than auto-commenting.
  - Include Luigi in a launch-mode risk meeting.
- id: design_blocked_by_scope
  visibility_scope: private
  owner_id: peach
  summary: Peach cannot finish onboarding screens until the Friday launch mode is clarified.
- id: nimbus_values_reliability
  visibility_scope: private
  owner_id: daisy
  summary: For Nimbus Labs, reliable draft suggestions are better than auto-posted comments that might
    review stale code.
- id: draft_mode_scope_confirmed
  visibility_scope: derived
  summary: The Friday beta scope is draft-suggestions mode with human approval before comments are posted.
- id: draft_mode_approved
  visibility_scope: derived
  summary: Toad approved shipping draft mode for Friday.
- id: koopa_needs_audit_csv
  visibility_scope: private
  owner_id: daisy
  summary: Koopa Bank needs a CSV export of admin audit logs for a Thursday security review, but they
    mostly need a clear scoped answer.
- id: audit_log_one_time_export_feasible
  visibility_scope: hidden
  owner_id: luigi
  summary: A one-time CSV export is feasible this week, but a full self-serve audit export needs follow-up
    work after the PR Review Agent beta.
- id: audit_export_scope_confirmed
  visibility_scope: derived
  summary: The Koopa Bank audit log export scope is one-time CSV for the security review, with full self-serve
    export deferred.

docs:
- id: project_brief
  title: PR Review Agent Beta Brief
  kind: brief
  visibility_scope: public
  visible_at: '2026-06-22T09:00:00'
  body: 'PR Review Agent goal: help engineering teams review pull requests faster. Friday pilot: Nimbus
    Labs. Full beta mode posts review comments automatically on PRs. Draft-mode beta prepares suggestions
    for human approval before posting. Draft mode is less flashy, but safer if repo sync is not reliable.'
- id: monday_standup
  title: Monday Standup Notes
  kind: meeting_notes
  visibility_scope: public
  visible_at: '2026-06-22T09:00:00'
  body: Mario wants auto-commenting if possible. Peach needs launch-mode confirmation before final onboarding.
    Daisy needs written customer-ready language by email before she updates Nimbus. Luigi said he is still
    hardening repo sync ordering.
- id: beta_rollout_template
  title: Nimbus Beta Rollout Template
  kind: customer_note_template
  visibility_scope: public
  visible_at: '2026-06-22T09:00:00'
  body: 'Rollout note must answer three questions: whether the agent posts comments automatically, what
    human approval means in draft mode, and what known limitation remains after Friday. Daisy needs the
    final customer-ready handoff by email, not chat, so she can forward and archive the approved wording.
    Avoid promising auto-commenting until repo sync is proven reliable.'
- id: launch_decision_record
  title: Friday Launch Decision Record
  kind: decision_record
  visibility_scope: public
  visible_at: '2026-06-22T09:00:00'
  body: Decision pending. Record the approved Friday launch mode, approval owner, customer-visible behavior,
    and any follow-up scope before Daisy updates Nimbus.
- id: repo_sync_notes
  title: Repo Sync Notes
  kind: engineering_notes
  visibility_scope: hidden
  owner_id: luigi
  metadata:
    owner_id: luigi
  body: Webhook events can arrive out of order. The sync worker sometimes evaluates an older commit SHA,
    so auto-posted review comments may target stale code. Draft mode avoids customer-visible bad comments
    while the worker is hardened.
- id: private_repo_security_baseline
  title: Private Repo Security Baseline
  kind: security_note
  visibility_scope: hidden
  owner_id: luigi
  metadata:
    owner_id: luigi
  body: 'For the Nimbus beta, the PR Review Agent processes private-repo source snippets transiently to
    generate review suggestions. Raw source code is not stored long term. Generated draft suggestions,
    PR metadata, commit SHAs, and audit metadata may be retained for 30 days during the beta. Customer-facing
    wording should say: source is processed transiently, raw source is not retained long term, and generated
    suggestions plus metadata are retained for the beta audit window.'
- id: koopa_audit_export_note
  title: Koopa Audit Export Note
  kind: customer_note
  visibility_scope: hidden
  body: 'Koopa Bank asked whether admin audit logs can be exported before their Thursday security review.
    The open question is scope: a one-time CSV for the review may be feasible, while a full self-serve
    export likely needs follow-up planning. Daisy needs any customer-facing Koopa answer by email so she
    can send the exact wording to Koopa.'

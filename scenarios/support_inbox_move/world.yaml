projects:
- id: support_inbox_move
  name: Support Inbox Move
  customer: Support Team
  deadline: '2026-06-26T15:00:00'
  status: at_risk
  risk_level: medium
  stakeholder_pressure: The team wants to switch to the new help desk on Thursday without losing customer replies.
  description: Move customer support from the old shared inbox to the new help desk.
  decision: undecided
  success_criteria:
  - Support has the saved replies it uses every day.
  - VIP customer emails reach the new help desk.
  - The move plan says what changes Thursday and what stays as backup.
pressures:
- id: saved_replies_pressure
  project_id: support_inbox_move
  owner_id: alice
  kind: support_readiness
  intensity: 5
  min_intensity: 1
  max_intensity: 10
  reason: Alice needs the old saved replies moved before the support team switches tools.
  due_at: '2026-06-25T12:00:00'
- id: vip_email_pressure
  project_id: support_inbox_move
  owner_id: bob
  kind: email_routing
  intensity: 5
  min_intensity: 1
  max_intensity: 10
  reason: Bob needs the VIP forwarding rule tested before the old inbox becomes backup-only.
  due_at: '2026-06-25T12:00:00'
people:
- id: alice
  name: Alice
  role: Support Lead
  goals:
  - Make sure the team can answer common customer questions on Thursday.
  - Keep the old inbox available as a backup for one week.
  constraints:
  - The new help desk does not automatically import saved replies.
  - Alice needs written wording the support team can follow.
  availability:
  - day: Monday
    start: 09:00
    end: '17:00'
  - day: Tuesday
    start: 09:00
    end: '17:00'
  - day: Wednesday
    start: 09:00
    end: '17:00'
  - day: Thursday
    start: 09:00
    end: '14:00'
  response_delay_minutes: 45
  private_knowledge:
    fact_ids:
    - saved_replies_missing
    - top_saved_replies_can_move
  behavior:
    current_focus: moving saved support replies into the new help desk
    needs_from_pm:
    - ask whether the old saved replies are already in the new help desk
    - send the support team wording before Thursday
    known_constraints:
    - saved replies do not import automatically
    - the old inbox can stay read-only for one week
  private_fact_ids:
  - saved_replies_missing
  - top_saved_replies_can_move
- id: bob
  name: Bob
  role: Infrastructure Engineer
  goals:
  - Make sure VIP customer emails route to the new help desk.
  - Avoid changing all email routing until the VIP rule has been tested.
  constraints:
  - The default forwarding rule misses VIP aliases.
  - Bob needs a test before the switch is called ready.
  availability:
  - day: Monday
    start: '10:00'
    end: '18:00'
  - day: Tuesday
    start: '10:00'
    end: '18:00'
  - day: Wednesday
    start: '10:00'
    end: '18:00'
  - day: Thursday
    start: '10:00'
    end: '14:30'
  response_delay_minutes: 75
  private_knowledge:
    fact_ids:
    - vip_email_routing_gap
    - vip_forwarding_test_ok
  behavior:
    current_focus: testing customer email forwarding
    needs_from_pm:
    - ask whether VIP emails reach the new help desk
    - keep the old inbox as backup until the test passes
    known_constraints:
    - VIP aliases bypass the default forwarding rule
    - a simple forwarding allowlist fixes the gap
  private_fact_ids:
  - vip_email_routing_gap
  - vip_forwarding_test_ok

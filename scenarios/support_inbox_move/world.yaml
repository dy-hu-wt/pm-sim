facts:
- id: saved_replies_missing
  visibility_scope: hidden
  owner_id: alice
  summary: The old inbox has saved replies that the new help desk did not import.
  revealed_by:
  - Ask Alice about saved replies, support templates, or what the support team needs.
  - Wait for Alice's Tuesday reminder.
- id: top_saved_replies_can_move
  visibility_scope: hidden
  owner_id: alice
  summary: Moving the top 12 saved replies is enough for Thursday if the old inbox stays read-only for one week.
- id: vip_email_routing_gap
  visibility_scope: hidden
  owner_id: bob
  summary: VIP customer aliases bypass the default forwarding rule and may keep landing in the old inbox.
  revealed_by:
  - Ask Bob about VIP email routing, forwarding, aliases, or testing the switch.
  - Wait for Bob's Tuesday reminder.
- id: vip_forwarding_test_ok
  visibility_scope: hidden
  owner_id: bob
  summary: A tested VIP forwarding allowlist fixes the routing gap while the old inbox stays available as backup.
- id: inbox_move_plan
  visibility_scope: derived
  summary: Thursday move plan is top saved replies moved, VIP forwarding tested, and old inbox read-only for one week.
tasks:
- id: move_saved_replies
  project_id: support_inbox_move
  title: Move top saved replies
  description: Alice needs the most-used saved replies in the new help desk before the team switches.
  owner_id: alice
  status: blocked
  priority: high
  due_at: '2026-06-25T12:00:00'
  blocked_by: saved_replies_missing
- id: test_vip_routing
  project_id: support_inbox_move
  title: Test VIP email routing
  description: Bob needs VIP aliases forwarded to the new help desk before the old inbox becomes backup-only.
  owner_id: bob
  status: blocked
  priority: high
  due_at: '2026-06-25T12:00:00'
  blocked_by: vip_email_routing_gap
- id: write_move_plan
  project_id: support_inbox_move
  title: Write inbox move plan
  description: The plan should say what moves Thursday and how the old inbox is used as backup.
  status: not_started
  priority: high
  due_at: '2026-06-25T13:00:00'
  blocked_by: move_plan_missing
- id: send_owner_updates
  project_id: support_inbox_move
  title: Send Alice and Bob the final plan
  description: Both owners need written confirmation before the switch is called ready.
  status: not_started
  priority: medium
  due_at: '2026-06-25T14:00:00'
  blocked_by: move_plan_missing
dependencies:
- id: dep_plan_needs_saved_replies
  project_id: support_inbox_move
  upstream_task_id: move_saved_replies
  downstream_task_id: write_move_plan
  description: The move plan needs Alice's saved reply scope.
- id: dep_plan_needs_vip_routing
  project_id: support_inbox_move
  upstream_task_id: test_vip_routing
  downstream_task_id: write_move_plan

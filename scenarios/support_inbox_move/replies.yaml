reply_behaviors:
  alice:
  - id: alice_reveals_saved_reply_gap
    channel: chat
    priority: 100
    match:
      absent_facts:
      - saved_replies_missing
      intents:
      - id: saved_reply_signal
        description: The PM asks about saved replies, templates, support readiness, or the old inbox.
        signals:
        - saved replies
        - saved reply
        - template
        - templates
        - support
        - old inbox
        - help desk
        - ready
      require_all:
      - saved_reply_signal
      mode: deterministic
    when:
    - coworker_state:
        person_id: alice
        key: saved_reply_risk_shared
        equals: false
    reply:
      delay_minutes: 45
      body: The new help desk did not import our old saved replies. Move the top 12 saved replies before Thursday and keep the old inbox read-only for one week as backup.
    effects:
    - type: discover_fact
      fact_id: saved_replies_missing
      source: alice_chat_reply
    - type: discover_fact
      fact_id: top_saved_replies_can_move
      source: alice_chat_reply
    - type: reveal_doc
      doc_id: old_inbox_notes
    - type: update_blocker
      blocker_id: saved_replies_missing
      status: surfaced
    - type: update_task
      task_id: move_saved_replies
      status: in_progress
    - type: update_coworker_state
      person_id: alice
      key: saved_reply_risk_shared
      value: true
    - type: update_coworker_state
      person_id: alice
      key: saved_reply_plan_confirmed
      value: true
  - id: alice_default
    channel: chat
    priority: 0
    match:
      intents: []
      mode: deterministic
    when: []
    reply:
      delay_minutes: 45
      body: I need the new help desk to be usable for the support team on Thursday. Ask me about saved replies or old inbox backup if you need the risky part.
    effects: []
  bob:
  - id: bob_reveals_vip_routing_gap
    channel: chat
    priority: 100
    match:
      absent_facts:
      - vip_email_routing_gap
      intents:
      - id: vip_routing_signal
        description: The PM asks about VIP email routing, forwarding, aliases, or testing.
        signals:
        - vip
        - email
        - routing
        - forwarding
        - alias
        - aliases
        - test
        - old inbox
        - help desk
      require_all:
      - vip_routing_signal
      mode: deterministic
    when:
    - coworker_state:
        person_id: bob
        key: vip_routing_risk_shared
        equals: false
    reply:
      delay_minutes: 75
      body: VIP customer aliases bypass the default forwarding rule. Add the VIP allowlist, send a test email to the new help desk, and keep the old inbox open as backup for a week.
    effects:
    - type: discover_fact
      fact_id: vip_email_routing_gap
      source: bob_chat_reply
    - type: discover_fact
      fact_id: vip_forwarding_test_ok
      source: bob_chat_reply
    - type: reveal_doc
      doc_id: vip_routing_note
    - type: update_blocker
      blocker_id: vip_email_routing_gap
      status: surfaced
    - type: update_task
      task_id: test_vip_routing
      status: in_progress
    - type: update_coworker_state
      person_id: bob
      key: vip_routing_risk_shared
      value: true
    - type: update_coworker_state
      person_id: bob
      key: vip_routing_plan_confirmed
      value: true
  - id: bob_default
    channel: chat
    priority: 0
    match:
      intents: []
      mode: deterministic
    when: []
    reply:
      delay_minutes: 75
      body: I can help with routing. Ask me about VIP email forwarding or testing if you need the risky part.
    effects: []

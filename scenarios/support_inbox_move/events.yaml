event_behaviors:
- id: nora_saved_reply_reminder
  event_type: nora_saved_reply_reminder
  when:
  - not:
      coworker_state:
        person_id: nora
        key: saved_reply_risk_shared
        equals: true
  effects:
  - type: create_message
    channel: chat
    sender_id: nora
    recipient_id: agent
    body: I checked the new help desk and the old saved replies are missing. We should move the top replies before Thursday and keep the old inbox read-only for backup.
  - type: discover_fact
    fact_id: saved_replies_missing
    source: nora_saved_reply_reminder
  - type: discover_fact
    fact_id: top_saved_replies_can_move
    source: nora_saved_reply_reminder
  - type: reveal_doc
    doc_id: old_inbox_notes
  - type: update_blocker
    blocker_id: saved_replies_missing
    status: surfaced
  - type: update_task
    task_id: move_saved_replies
    status: in_progress
  - type: update_coworker_state
    person_id: nora
    key: saved_reply_risk_shared
    value: true
  - type: update_coworker_state
    person_id: nora
    key: saved_reply_plan_confirmed
    value: true
  - type: increase_pressure
    pressure_id: saved_replies_pressure
    by: 2
    reason: Nora had to remind the PM that saved replies are missing.
- id: felix_vip_routing_reminder
  event_type: felix_vip_routing_reminder
  when:
  - not:
      coworker_state:
        person_id: felix
        key: vip_routing_risk_shared
        equals: true
  effects:
  - type: create_message
    channel: email
    sender_id: felix
    recipient_id: agent
    subject: VIP email routing gap
    body: The default forwarding rule misses VIP aliases. We need to add the VIP allowlist, send a test email, and keep the old inbox open as backup for a week.
  - type: discover_fact
    fact_id: vip_email_routing_gap
    source: felix_vip_routing_reminder
  - type: discover_fact
    fact_id: vip_forwarding_test_ok
    source: felix_vip_routing_reminder
  - type: reveal_doc
    doc_id: vip_routing_note
  - type: update_blocker
    blocker_id: vip_email_routing_gap
    status: surfaced
  - type: update_task
    task_id: test_vip_routing
    status: in_progress
  - type: update_coworker_state
    person_id: felix
    key: vip_routing_risk_shared
    value: true
  - type: update_coworker_state
    person_id: felix
    key: vip_routing_plan_confirmed
    value: true
  - type: increase_pressure
    pressure_id: vip_email_pressure
    by: 2
    reason: Felix had to remind the PM that VIP routing is not tested.

meeting_behaviors:
- id: inbox_move_checkin
  required_attendees:
  - nora
  - felix
  topic_match:
    mode: deterministic
    intents:
    - id: inbox_move_signal
      description: The meeting is about the support inbox move.
      signals:
      - inbox move
      - help desk
      - saved replies
      - vip routing
      - old inbox
    require_all:
    - inbox_move_signal
  transcript_lines:
  - Nora confirmed the top 12 saved replies must move before Thursday.
  - Felix confirmed VIP aliases need a tested forwarding allowlist.
  - The PM agreed to write the move plan and send both owners the final wording.
  effects:
  - type: discover_fact
    fact_id: saved_replies_missing
    source: inbox_move_meeting
  - type: discover_fact
    fact_id: top_saved_replies_can_move
    source: inbox_move_meeting
  - type: discover_fact
    fact_id: vip_email_routing_gap
    source: inbox_move_meeting
  - type: discover_fact
    fact_id: vip_forwarding_test_ok
    source: inbox_move_meeting
  - type: update_blocker
    blocker_id: saved_replies_missing
    status: surfaced
  - type: update_blocker
    blocker_id: vip_email_routing_gap
    status: surfaced
  - type: update_task
    task_id: move_saved_replies
    status: in_progress
  - type: update_task
    task_id: test_vip_routing
    status: in_progress
  - type: update_coworker_state
    person_id: nora
    key: saved_reply_risk_shared
    value: true
  - type: update_coworker_state
    person_id: nora
    key: saved_reply_plan_confirmed
    value: true
  - type: update_coworker_state
    person_id: felix
    key: vip_routing_risk_shared
    value: true
  - type: update_coworker_state
    person_id: felix
    key: vip_routing_plan_confirmed
    value: true

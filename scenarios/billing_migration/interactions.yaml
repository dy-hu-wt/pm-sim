event_rules:
- id: mario_full_cutover_push
  event_type: mario_full_cutover_push
  effects:
  - type: create_message
    channel: chat
    sender_id: mario
    recipient_id: agent
    body: Sales is asking whether we can say Atlas is fully cut over on Friday. Please call out any data-quality
      risk before we promise that.
  - type: update_project
    project_id: project_billing_migration
    stakeholder_pressure_delta: 1
- id: meridian_export_request
  event_type: meridian_export_request
  effects:
  - type: create_message
    channel: email
    sender_id: daisy
    recipient_id: agent
    subject: Meridian invoice export request
    body: Meridian asked whether they can get invoice export data before Thursday's finance review. Please
      keep this scoped so it does not derail Atlas billing migration.
  - type: discover_fact
    fact_id: fact_meridian_needs_invoice_export
    source: meridian_export_request
  - type: reveal_doc
    doc_id: doc_meridian_export_note
  - type: update_blocker
    blocker_id: blocker_invoice_export_scope
    status: surfaced
  - type: update_project
    project_id: project_invoice_export
    stakeholder_pressure_delta: 1
- id: daisy_final_readiness_check
  event_type: daisy_final_readiness_check
  effects:
  - type: create_message
    channel: chat
    sender_id: daisy
    recipient_id: agent
    body: 'Before I send the Thursday Atlas note, I need one final go/no-go by email: migration mode,
      data-risk rationale, and whether Meridian stayed scoped away from Atlas work.'
actor_behaviors:
- id: luigi_email_invoice_export_feasibility
  kind: reply
  person_id: luigi
  channel: email
  priority: 120
  match:
    required_facts:
    - fact_meridian_needs_invoice_export
    intents:
    - id: routing_signal_1
      description: Match one authored routing signal.
      signals:
      - meridian
      - export
      - invoice
      - csv
      - finance review
    require_all:
    - routing_signal_1
    mode: deterministic
  when: []
  reply:
    subject: 'Re: Meridian invoice export feasibility'
    body: For Meridian, a one-time invoice export is feasible for the finance review. A self-serve export
      feature is larger work and should stay follow-up after Atlas.
  effects:
  - type: discover_fact
    fact_id: fact_invoice_export_feasible
    source: luigi_email_reply
  - type: update_task
    task_id: task_meridian_export_scope
    status: in_progress
  - type: update_coworker_state
    person_id: luigi
    key: export_feasibility_shared
    value: true
- id: luigi_email_reveals_backfill_risk
  kind: reply
  person_id: luigi
  channel: email
  priority: 100
  match:
    intents:
    - id: routing_signal_1
      description: Match one authored routing signal.
      signals:
      - backfill
      - checksum
      - billing
      - migration
      - cutover
      - invoice
      - risk
    require_all:
    - routing_signal_1
    mode: deterministic
  when:
  - coworker_state:
      person_id: luigi
      key: backfill_risk_shared
      equals: false
  reply:
    subject: 'Re: billing migration risk'
    body: The blocker is backfill parity. Checksums disagree for enterprise discount invoices, so full
      cutover could create incorrect invoice totals. I recommend read-only shadow mode this week while
      I keep fixing parity.
  effects:
  - type: discover_fact
    fact_id: fact_backfill_checksum_mismatch
    source: luigi_email_reply
  - type: discover_fact
    fact_id: fact_shadow_mode_safe

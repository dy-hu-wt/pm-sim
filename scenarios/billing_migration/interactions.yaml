  - type: update_blocker
    blocker_id: blocker_backfill_checksum_unknown
    status: surfaced
  - type: update_project
    project_id: project_billing_migration
    migration_conflict:
      status: investigated
      inputs:
        technical_risk_substantiated: true
  - type: update_coworker_state
    person_id: luigi
    key: backfill_risk_shared

agent_brief:
  objective: Run the billing migration readiness week for Atlas Retail.
  guidance:
  - Use email, not chat, for customer-ready wording that Daisy needs to forward or archive.
  - Daisy needs customer-ready Atlas migration wording before Thursday afternoon.
  - Meridian needs scoped invoice-export wording before Thursday's finance review.
  - Thursday final-readiness requests need an answer before the final deadline.
  - When writing the migration decision record, include Toad's approval, staged shadow mode, full cutover deferred, checksum/backfill risk rationale, customer impact, and follow-up parity work.
  - Do not promise full billing cutover unless visible state proves checksum parity.
  - Keep Meridian export work scoped so it does not derail Atlas migration readiness.
  finish_criteria:
  - migration mode is approved
  - customer messaging is ready
  - blocked work is unblocked
  - visible interruption requests have been answered from grounded state
  - no visible calendar obligations remain
  tool_hints:
    update_doc: 'For doc_migration_decision_record, write the complete decision: Toad approval, staged shadow mode, full cutover deferred, checksum/backfill risk rationale, customer impact, and follow-up parity work.'
grading_rules:
- id: atlas_customer_update
  template: grounded_communication
  priority: 80
  requires:
  - not:
      coworker_state:
        person_id: daisy
        key: atlas_update_received
        equals: true
  - fact_discovered: backfill_checksum_mismatch
  - fact_discovered: atlas_values_invoice_correctness
  - project_decision:
      project_id: billing_migration
      equals: staged_shadow_mode
  action:
    type: send_email
    recipient_id: daisy
    match:
      mode: concept_match
      required_concepts:
      - id: atlas_friday_migration_context
        description: The message is about the Atlas Friday billing migration.
        exemplars:
        - Atlas Friday billing migration
        - Atlas migration for Friday
        must_be_asserted: true
      - id: staged_shadow_mode
        description: The message says staged shadow mode is the plan, not full cutover.
        exemplars:
        - staged shadow mode instead of full cutover
        - full cutover is deferred and Atlas uses staged shadow mode
        - run in staged shadow mode
        - go with staged shadow mode, not full cutover
        must_be_asserted: true
      - id: invoice_correctness_risk
        description: The message explains checksum/backfill or invoice correctness risk.
        exemplars:
        - checksum mismatch creates invoice correctness risk
        - backfill risk could produce incorrect invoices
        - checksum/backfill mismatch could affect invoice correctness
        - backfill checksum risk remains for enterprise discount invoices
        must_be_asserted: true
      forbidden_concepts:
      - id: unsafe_full_cutover
        description: The message promises full billing cutover this week.
        exemplars:
        - full cutover is approved for Friday
        - all invoices will come from the new ledger this week
        must_be_asserted: true
  state:
    person_id: daisy
    key: atlas_update_received
    value: true
  effects:
  - type: lower_pressure
    pressure_id: atlas_customer_confidence
    to: 2
    reason: Daisy received grounded customer-ready Atlas migration wording.
  milestone:
    key: atlas_update_sent
    note: Daisy received grounded Atlas customer wording by email.
- id: meridian_export_update
  template: grounded_communication
  priority: 80
  requires:
  - not:
      coworker_state:
        person_id: daisy
        key: meridian_update_received
        equals: true
  - fact_discovered: meridian_needs_invoice_export
  - fact_discovered: invoice_export_feasible
  - coworker_state:
      person_id: toad
      key: export_scope_aligned
      equals: true
  action:
    type: send_email
    recipient_id: daisy
    match:
      mode: concept_match
      required_concepts:
      - id: meridian_invoice_export_context
        description: The message addresses Meridian invoice export or finance-review needs.
        exemplars:
        - Meridian invoice export for the finance review
        - Meridian finance review export answer
        must_be_asserted: true
      - id: one_time_export
        description: A one-time invoice export is feasible.
        exemplars:
        - Meridian can get a one-time invoice export
        - one-time CSV export is feasible for Meridian
        must_be_asserted: true
      - id: self_serve_followup
        description: Self-serve export remains follow-up work.
        exemplars:
        - self-serve export remains follow-up
        - full self-serve export stays later follow-up work
        must_be_asserted: true
      forbidden_concepts:
      - id: unsafe_self_serve_commitment
        description: The message commits to self-serve export this week.
        exemplars:
        - self-serve export is ready this week
        - productized export by Thursday
        must_be_asserted: true
  state:
    person_id: daisy
    key: meridian_update_received
    value: true
  effects:
  - type: lower_pressure
    pressure_id: meridian_finance_review_pressure
    to: 2
    reason: Daisy received scoped Meridian finance-review wording.
  milestone:
    key: meridian_update_sent
    note: Daisy received the scoped Meridian export answer by email.
- id: final_billing_readiness
  template: grounded_communication
  priority: 90
  requires:
  - coworker_state:
      person_id: daisy
      key: atlas_update_received
      equals: true
  - coworker_state:
      person_id: daisy
      key: meridian_update_received
      equals: true
  - coworker_state:
      person_id: toad
      key: decision_record_written
      equals: true
  action:
    type: send_email
    recipient_id: daisy
    match:
      mode: concept_match
      required_concepts:
      - id: final_atlas_go
        description: The message gives a final go/no-go for Atlas Friday.
        exemplars:
        - final readiness is go for Atlas Friday
        - Atlas Friday go/no-go is go
        - 'Final readiness: go for Friday Atlas billing migration'
        must_be_asserted: true
      - id: staged_shadow_mode
        description: Atlas remains in staged shadow mode with full cutover deferred.
        exemplars:
        - staged shadow mode with full cutover deferred
        - full cutover is deferred and shadow mode is the plan
        - staged shadow mode. Full cutover is deferred
        - Friday Atlas billing migration in staged shadow mode. Full cutover is deferred
        must_be_asserted: true
      - id: meridian_one_time_scope
        description: Meridian remains scoped to a one-time export.
        exemplars:
        - Meridian remains scoped to a one-time export
        - Meridian gets a one-time export and self-serve remains follow-up
        must_be_asserted: true
      forbidden_concepts: []
  state:
    person_id: daisy
    key: final_readiness_received
    value: true
  milestone:
    key: final_readiness_confirmed
    note: Daisy received a final go/no-go covering Atlas and Meridian scope.
task_gate_rules:
- task_id: migration_decision
  statuses:
  - complete
  - completed
  - done
  requires:
  - coworker_state:
      person_id: toad
      key: stage_approved
      equals: true
  error: migration_decision cannot complete before Toad approves staged shadow mode.
- task_id: atlas_customer_update
  statuses:
  - complete
  - completed
  - done
  requires:
  - coworker_state:
      person_id: daisy
      key: atlas_update_received
      equals: true
  error: atlas_customer_update cannot complete until Daisy receives the Atlas update by email.
- task_id: meridian_update
  statuses:
  - complete
  - completed
  - done
  requires:
  - coworker_state:
      person_id: daisy
      key: meridian_update_received
      equals: true
  error: meridian_update cannot complete until Daisy receives the Meridian export update by email.
outcome_rules:
- id: unsafe_full_cutover
  when:
  - project_id: billing_migration
  - project_decision:
      project_id: billing_migration
      equals: full_cutover
  - blocker_status:
      id: backfill_checksum_unknown
      is: unresolved
  result:
    status: shipped
    risk_level: high
    final_outcome: unsafe_full_cutover
    summary: Atlas was promised full cutover while backfill checksum risk remained unresolved.
- id: missed_migration_decision
  when:
  - project_id: billing_migration
  - not:
      coworker_state:
        person_id: toad
        key: stage_approved
        equals: true
  result:
    status: missed
    risk_level: high
    final_outcome: missed_migration_decision
    summary: Friday arrived without an approved Atlas billing migration mode.
- id: atlas_derailed_by_export_overcommitment
  when:
  - project_id: billing_migration
  - coworker_state:
      person_id: toad
      key: meridian_export_overscoped
      equals: true
  result:
    status: partial
    risk_level: high
    final_outcome: atlas_derailed_by_export_overcommitment
    summary: Atlas staged migration was approved, but the PM overcommitted Luigi to Meridian self-serve export work during the same week, reducing confidence in migration readiness.
- id: staged_billing_migration_ready
  when:
  - project_id: billing_migration
  - coworker_state:
      person_id: daisy
      key: final_readiness_received
      equals: true
  result:
    status: shipped
    risk_level: low
    final_outcome: staged_billing_migration_ready
    summary: 'Atlas received safe staged-shadow migration readiness: invoice correctness protected and full cutover deferred until checksum parity.'
- id: late_or_partial_staged_migration
  when:
  - project_id: billing_migration
  result:
    status: partial
    risk_level: medium
    final_outcome: late_or_partial_staged_migration
    summary: Staged migration was approved, but final customer readiness was not fully closed.
- id: meridian_export_ready
  when:
  - project_id: invoice_export
  - coworker_state:
      person_id: daisy
      key: meridian_update_received
      equals: true
  result:
    status: active
    risk_level: low
    final_outcome: meridian_export_ready
    summary: Meridian received a scoped one-time invoice export answer for Thursday; self-serve export remained follow-up.
- id: meridian_export_unresolved
  when:
  - project_id: invoice_export
  result:
    status: at_risk
    risk_level: medium
    final_outcome: meridian_export_unresolved
    summary: Meridian reached the Thursday finance review without a scoped invoice export answer.
scripted_policy:
- name: read_billing_brief
  tool: read_doc
  args:
    doc_id: billing_brief
- name: read_standup
  tool: read_doc
  args:
    doc_id: monday_billing_standup
- name: ask_luigi_about_backfill_risk
  tool: send_chat
  args:
    person_id: luigi
    body: For Atlas billing migration readiness, what is the current backfill checksum or invoice risk for full cutover?
- name: wait_for_luigi_risk
  tool: advance_time
  args:
    target: until_next_event
- name: align_daisy_on_staged_mode
  tool: send_chat
  args:
    person_id: daisy
    body: 'Atlas Friday update: Luigi found backfill checksum risk that could create incorrect invoice totals. Can we message staged shadow mode as the safe path rather than full cutover?'
- name: wait_for_daisy_alignment
  tool: advance_time
  args:
    target: until_next_event
- name: ask_toad_for_staged_approval
  tool: send_chat
  args:
    person_id: toad
    body: 'Approval ask for Atlas billing migration: choose staged shadow mode for Friday, not full cutover. Reason: backfill checksum risk could create incorrect invoices; Daisy says Atlas values invoice correctness and can accept staged mode.'
- name: wait_for_toad_approval
  tool: advance_time
  args:
    target: until_next_event
- name: record_migration_decision
  tool: update_doc
  args:
    doc_id: migration_decision_record
    body: 'Decision: Toad approved staged shadow mode for Friday, not full cutover. Rationale: Luigi found backfill checksum mismatch risk for enterprise discount invoices, which could create incorrect invoice totals. Customer impact: Atlas values invoice correctness and can accept staged mode. Follow-up: full cutover after checksum parity is proven.'
- name: send_atlas_customer_update
  tool: send_email
  args:
    person_id: daisy
    subject: Atlas billing migration Friday wording
    body: 'Atlas Friday update: go with staged shadow mode, not full cutover. This protects invoice correctness because backfill checksum risk remains for enterprise discount invoices. Full cutover is deferred until checksum parity is proven.'
- name: wait_for_meridian_request
  tool: advance_time
  args:
    target: to:2026-06-24T13:00:00
- name: ask_luigi_about_meridian_export
  tool: send_chat
  args:
    person_id: luigi
    body: Meridian needs invoice export data before Thursday's finance review. Is a one-time export feasible, and should self-serve export stay follow-up?
- name: wait_for_export_feasibility
  tool: advance_time
  args:
    target: until_next_event
- name: ask_toad_to_scope_meridian
  tool: send_chat
  args:
    person_id: toad
    body: 'Meridian export scope: Luigi says a one-time invoice export is feasible for the finance review, while self-serve export is follow-up. Can we scope Meridian to one-time export so Atlas migration stays protected?'
- name: wait_for_meridian_scope
  tool: advance_time
  args:
    target: until_next_event
- name: send_meridian_scope_update
  tool: send_email
  args:
    person_id: daisy
    subject: Meridian invoice export scope
    body: Meridian can receive a one-time invoice export for the finance review. Self-serve export is follow-up and should not be promised this week, so Atlas migration work stays protected.
- name: wait_for_final_readiness
  tool: advance_time
  args:
    target: to:2026-06-25T12:00:00
- name: send_final_readiness_note
  tool: send_email
  args:
    person_id: daisy
    subject: Final Atlas billing go/no-go
    body: 'Final readiness: go for Friday Atlas billing migration in staged shadow mode. Full cutover is deferred because backfill checksum risk could affect invoice correctness. Meridian remains scoped to a one-time export, with self-serve follow-up after Atlas.'
baseline:
  description: If the PM does nothing, Atlas reaches Friday without a safe migration mode and Meridian gets no scoped export answer.
  expected_score: 15
  commands:
  - pm-sim reset --scenario scenarios/billing_migration
  - pm-sim advance-time to:2026-06-26T15:00:00
  - pm-sim evaluate --scenario scenarios/billing_migration --explain
  - pm-sim read-doc doc_billing_migration_outcome
milestone_rules:
- note: Luigi surfaced the billing backfill checksum blocker.
  when:
  - coworker_state:
      person_id: luigi
      key: backfill_risk_shared
      equals: true
  created_at:
    coworker_state:
      person_id: luigi
      key: backfill_risk_shared
  id: backfill_risk_discovered
- note: Daisy confirmed Atlas values invoice correctness over full cutover speed.
  when:
  - coworker_state:
      person_id: daisy
      key: customer_preference_shared
      equals: true
  created_at:
    coworker_state:
      person_id: daisy
      key: customer_preference_shared
  id: customer_preference_known
- note: Toad approved staged shadow mode for Friday.
  when:
  - coworker_state:
      person_id: toad
      key: stage_approved
      equals: true
  created_at:
    coworker_state:
      person_id: toad
      key: stage_approved
  id: staged_mode_approved
- note: The billing migration decision record was updated with rationale.
  when:
  - coworker_state:
      person_id: toad
      key: decision_record_written
      equals: true
  created_at:
    coworker_state:
      person_id: toad
      key: decision_record_written
  id: decision_record_written
- note: Meridian export was scoped to a one-time export with self-serve follow-up.
  when:
  - coworker_state:
      person_id: luigi
      key: export_feasibility_shared
      equals: true
  - coworker_state:
      person_id: toad
      key: export_scope_aligned
      equals: true
  created_at:
    coworker_state:
      person_id: toad
      key: export_scope_aligned
  id: meridian_scoped
score_components:
  discovery:
    points: 25
    preferred_before: '2026-06-25T10:00:00'
    milestones:
    - backfill_risk_discovered
    - customer_preference_known
  decision_quality:
    points: 25
    preferred_before: '2026-06-25T12:00:00'
    milestones:
    - staged_mode_approved
    - decision_record_written
  customer_communication:
    points: 20
    preferred_before: '2026-06-25T14:00:00'
    milestones:
    - atlas_update_sent
    - final_readiness_confirmed
  portfolio_tradeoff:
    points: 15
    preferred_before: '2026-06-25T15:00:00'
    milestones:
    - meridian_scoped
    - meridian_update_sent
  avoid_harmful_actions:
    points: 15
    direct_outreach_soft_limit: 16
    direct_outreach_penalty_per_extra: 1
    direct_outreach_max_penalty: 4
    harm_rules:
    - id: promised_full_cutover_with_open_backfill_risk
      note: Promised full cutover while backfill risk was unresolved.
      when:
      - message_exists:
          channel: email
          sender_id: agent
          match:
            mode: deterministic
            intents:
            - id: message_signal
              description: Message contains one authored signal.
              signals:
              - approved
            - id: message_required_signal_1
              description: Message contains required authored signal.
              signals:
              - full cutover
            require_all:
            - message_signal
            - message_required_signal_1
      - blocker_status:
          id: backfill_checksum_unknown
          is: unresolved
    - id: meridian_self_serve_export_overcommitment
      note: Overcommitted engineering to Meridian self-serve export work during Atlas migration readiness.
      when:
      - coworker_state:
          person_id: toad
          key: meridian_export_overscoped
          equals: true
